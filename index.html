<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora de Orçamentos e Vendas — HidroGood</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
  body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc}
  .tab-active{background:#1e40af;color:#fff;border-color:#1e40af}
  .tab-inactive{background:#fff;color:#374151;border-color:#d1d5db}
  .tab-inactive:hover{background:#f1f5f9}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;margin-bottom:1rem}
  .pill{display:inline-flex;align-items:center;padding:.15rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:600}
  .pill-ok{background:#dcfce7;color:#166534}
  .pill-warn{background:#fef9c3;color:#854d0e}
  .pill-bad{background:#fee2e2;color:#991b1b}
  .sl{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748b;margin:.75rem 0 .25rem}
  .sl-green{color:#059669}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th{text-align:left;padding:.5rem .75rem;background:#f8fafc;color:#64748b;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0}
  td{padding:.5rem .75rem;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f8fafc}
  .num{font-variant-numeric:tabular-nums}
  input[type=number],input[type=text],select{outline:none}
  input[type=number]:focus,input[type=text]:focus,select:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
  #view-banner{display:none;background:#1e40af;color:#fff;text-align:center;padding:.5rem 1rem;font-size:.8rem;font-weight:600;position:sticky;top:0;z-index:50;align-items:center;justify-content:center;gap:.5rem}
</style>
</head>
<body class="min-h-screen">
<div id="view-banner">
  <span>👁 Modo visualização — dados somente leitura</span>
</div>
<div class="max-w-5xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">HidroGood</h1>
      <p class="text-sm text-slate-500" id="hoje-label"></p>
    </div>
  </div>
  <div class="flex flex-wrap gap-2 mb-6">
    <button class="tab-btn tab-active px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="registrar">Orçamentos</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="vendas">Vendas</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="diaria">Visão diária</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="mensal">Visão mensal</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="pipeline">Pipeline de Vendas</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="historico">Histórico</button>
    <button class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="acumulado">Acumulado</button>
    <button id="tab-btn-config" class="tab-btn tab-inactive px-4 py-2 rounded-lg border text-sm font-medium transition-all" data-tab="config">Configurações</button>
  </div>
  <!-- REGISTRAR -->
  <section id="tab-registrar">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Data</label>
          <input type="date" id="reg-date" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
        </div>
        <div id="reg-date-info" class="text-xs text-slate-500"></div>
      </div>
    </div>
    <div id="reg-units" class="space-y-3"></div>
    <div id="reg-actions" class="flex gap-3 mt-4 flex-wrap items-center">
      <button id="btn-save" class="px-5 py-2 bg-blue-700 text-white rounded-lg text-sm font-semibold hover:bg-blue-800">Salvar</button>
      <button id="btn-clear" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50">Limpar</button>
      <span id="save-fb" class="text-xs text-emerald-700 font-semibold"></span>
    </div>
  </section>
  <!-- VENDAS -->
  <section id="tab-vendas" class="hidden">
    <div id="venda-form-card" class="card p-4 mb-4">
      <h3 class="font-semibold text-slate-800 mb-3 text-sm">Registrar venda</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Data do orçamento</label>
          <input type="date" id="sale-orc-date" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Time</label>
          <select id="sale-unit" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full bg-white"></select>
        </div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Data do fechamento</label>
          <input type="date" id="sale-date" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full">
        </div>
      </div>
      <div id="sale-orc-preview"></div>
      <div id="sale-inputs"></div>
      <div class="flex gap-3 mt-4 items-center flex-wrap">
        <button id="btn-save-sale" class="px-5 py-2 bg-emerald-700 text-white rounded-lg text-sm font-semibold hover:bg-emerald-800">Salvar venda</button>
        <span id="sale-fb" class="text-xs text-emerald-700 font-semibold"></span>
      </div>
    </div>
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 class="font-semibold text-slate-800 text-sm">Vendas fechadas no mês</h3>
        <input type="month" id="sale-list-month" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
      </div>
      <div id="sale-list" class="overflow-x-auto"></div>
    </div>
  </section>
  <!-- DIARIA -->
  <section id="tab-diaria" class="hidden">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Data</label>
          <input type="date" id="view-date" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
        </div>
        <div id="view-date-info" class="text-xs text-slate-500"></div>
      </div>
    </div>
    <div id="diaria-content"></div>
  </section>
  <!-- MENSAL -->
  <section id="tab-mensal" class="hidden">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Mês</label>
          <input type="month" id="mensal-month" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
        </div>
        <div id="mensal-month-info" class="text-xs text-slate-500"></div>
      </div>
    </div>
    <div id="mensal-content"></div>
  </section>
  <!-- PIPELINE -->
  <section id="tab-pipeline" class="hidden">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Mês</label>
          <input type="month" id="pipeline-month" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
        </div>
        <div id="pipeline-month-info" class="text-xs text-slate-500"></div>
      </div>
    </div>
    <div id="pipeline-content"></div>
  </section>
  <!-- HISTORICO -->
  <section id="tab-historico" class="hidden">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Mês</label>
          <input type="month" id="hist-month" class="border border-slate-300 rounded px-3 py-1.5 text-sm">
        </div>
      </div>
    </div>
    <div id="hist-content"></div>
  </section>
  <!-- ACUMULADO -->
  <section id="tab-acumulado" class="hidden">
    <div class="card p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div id="acum-info" class="text-xs text-slate-500"></div>
      </div>
    </div>
    <div id="acum-content"></div>
  </section>
  <!-- CONFIG -->
  <section id="tab-config" class="hidden">
    <div class="card p-4 mb-4">
      <h3 class="font-semibold text-slate-800 mb-4 text-sm">Configurações gerais</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Meta orçamentos/pessoa/dia</label>
          <input type="number" id="cfg-meta" min="1" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Dias úteis (sobrescrever)</label>
          <input type="number" id="cfg-wd" min="1" max="31" placeholder="Auto" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1">Data início do mês</label>
          <input type="date" id="cfg-sd" class="border border-slate-300 rounded px-3 py-1.5 text-sm w-full">
        </div>
      </div>
      <p class="sl mt-4">Ticket médio meta</p>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="block text-[10px] text-slate-500 mb-1">Hidroponia</label>
          <input type="number" id="cfg-tkh" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-[10px] text-slate-500 mb-1">Estufa</label>
          <input type="number" id="cfg-tke" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-[10px] text-slate-500 mb-1">Combo</label>
          <input type="number" id="cfg-tkc" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
      </div>
      <p class="sl mt-4">Mix de vendas (%) — soma deve ser 100</p>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="block text-[10px] text-slate-500 mb-1">Hidroponia</label>
          <input type="number" id="cfg-mh" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-[10px] text-slate-500 mb-1">Estufa</label>
          <input type="number" id="cfg-me" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
        <div><label class="block text-[10px] text-slate-500 mb-1">Combo</label>
          <input type="number" id="cfg-mc" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full">
        </div>
      </div>
    </div>
    <div class="card p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-slate-800 text-sm">Times</h3>
        <button id="btn-add-u" class="px-3 py-1.5 text-xs bg-blue-700 text-white rounded hover:bg-blue-800">+ Time</button>
      </div>
      <div id="cfg-units" class="space-y-2"></div>
    </div>
    <div class="flex gap-3 flex-wrap items-center mb-6">
      <button id="btn-save-cfg" class="px-5 py-2 bg-blue-700 text-white rounded-lg text-sm font-semibold hover:bg-blue-800">Salvar configurações</button>
      <button id="btn-reset-cfg" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50">Restaurar padrão</button>
      <span id="cfg-fb" class="text-xs text-emerald-700 font-semibold"></span>
    </div>
    <div class="card p-4 mb-4">
      <h3 class="font-semibold text-slate-800 mb-3 text-sm">Backup e compartilhamento</h3>
      <div class="flex gap-3 flex-wrap items-center mb-3">
        <button id="btn-exp" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50">⬇ Exportar backup</button>
        <button id="btn-imp" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50">⬆ Importar backup</button>
        <input type="file" id="btn-imp-f" accept=".json" class="hidden">
        <button id="btn-share" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔗 Gerar link de leitura</button>
      </div>
      <div id="share-url-box" class="hidden mt-3">
        <label class="block text-xs font-semibold text-slate-600 mb-1">Link gerado</label>
        <div class="flex gap-2 items-center">
          <input type="text" id="share-url-input" readonly class="border border-slate-300 rounded px-3 py-1.5 text-sm flex-1 bg-slate-50 font-mono text-xs">
          <button id="btn-copy-url" class="px-3 py-1.5 bg-blue-700 text-white rounded text-xs font-semibold hover:bg-blue-800">Copiar</button>
        </div>
        <p id="share-size-info" class="text-[10px] text-slate-400 mt-1"></p>
        <span id="share-fb" class="text-xs text-emerald-700 font-semibold"></span>
      </div>
    </div>
    <div class="card p-4 border-rose-200">
      <h3 class="font-semibold text-rose-800 mb-3 text-sm">Zona perigosa</h3>
      <button id="btn-wipe" class="px-4 py-2 border border-rose-300 text-rose-700 rounded-lg text-sm hover:bg-rose-50">🗑 Apagar todos os registros</button>
    </div>
  </section>
</div>

let S=structuredClone(SEED_STATE);
let VIEW_MODE=false;
function checkViewMode(){try{const h=location.hash;if(!h.startsWith('#data='))return false;const compressed=decodeURIComponent(h.slice(6));const json=LZString.decompressFromEncodedURIComponent(compressed);if(!json)return false;const o=JSON.parse(json);if(o.config)S.config=o.config;if(o.records)S.records=o.records;if(o.sales)S.sales=o.sales||[];VIEW_MODE=true;return true;}catch(e){console.warn('Falha:',e);return false}}
function applyViewMode(){if(!VIEW_MODE)return;document.querySelectorAll('section:not(.hidden)').forEach(sec=>{sec.querySelectorAll('input[type="number"],input[type="text"],select').forEach(el=>el.disabled=true);sec.querySelectorAll('button').forEach(el=>{if(!el.classList.contains('tab-btn'))el.disabled=true})});}
function genShareLink(){const json=JSON.stringify({config:S.config,records:S.records,sales:S.sales});const compressed=LZString.compressToEncodedURIComponent(json);const url=location.origin+location.pathname+'#data='+compressed;const box=document.getElementById('share-url-box');box.classList.remove('hidden');const inp=document.getElementById('share-url-input');inp.value=url;inp.select();document.getElementById('share-size-info').textContent='Tamanho: '+url.length.toLocaleString('pt-BR')+' chars';copyToClipboard(url,'share-fb','Link copiado!');}
function copyToClipboard(text,fbId,msg){const fb=document.getElementById(fbId);if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{if(fb){fb.textContent=msg;setTimeout(()=>fb.textContent='',3000)}}).catch(()=>{})}else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);if(fb){fb.textContent=msg;setTimeout(()=>fb.textContent='',3000)}}}
function load(){try{const c=localStorage.getItem('hg-config');if(c)S.config=JSON.parse(c)}catch(e){}try{const r=localStorage.getItem('hg-records');if(r)S.records=JSON.parse(r)}catch(e){}try{const s=localStorage.getItem('hg-sales');if(s)S.sales=JSON.parse(s)}catch(e){}if(!S.config.tickets)S.config.tickets=structuredClone(DCFG.tickets);if(!S.config.mix)S.config.mix=structuredClone(DCFG.mix);if(!S.config.units)S.config.units=structuredClone(DCFG.units);if(!S.sales)S.sales=[];}
function saveCfg(){if(!VIEW_MODE)localStorage.setItem('hg-config',JSON.stringify(S.config))}
function saveRec(){if(!VIEW_MODE)localStorage.setItem('hg-records',JSON.stringify(S.records))}
function saveSales(){if(!VIEW_MODE)localStorage.setItem('hg-sales',JSON.stringify(S.sales))}
const f$=v=>{if(v==null||isNaN(v))return'R$ 0';return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})};
const fN=(v,d=0)=>{if(v==null||isNaN(v))return'0';return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})};
const fP=v=>{if(v==null||isNaN(v))return'0%';return(v*100).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:1})+'%'};
const fD=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`};
const today=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const yesterday=()=>{const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const thisMo=()=>today().slice(0,7);
function wdOf(ms){const[y,m]=ms.split('-').map(Number);const last=new Date(y,m,0).getDate();const o=[];for(let d=1;d<=last;d++){if(new Date(y,m-1,d).getDay()%6!==0)o.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`)}const sd=S.config.monthStartDate;return sd?o.filter(d=>d>=sd):o}
function wdCount(ms){return S.config.workDaysOverride&&S.config.workDaysOverride>0?S.config.workDaysOverride:wdOf(ms).length}
function dayPos(ds){return wdOf(ds.slice(0,7)).indexOf(ds)+1}
function isWD(ds){return wdOf(ds.slice(0,7)).includes(ds)}
const totPpl=()=>S.config.units.reduce((s,u)=>s+(u.members?.length||0),0);
const dMeta=()=>totPpl()*S.config.metaPerPerson;
const uMeta=u=>(u.members?.length||0)*S.config.metaPerPerson;
const mByType=()=>{const t=dMeta(),m=S.config.mix;return{hidro:t*m.hidro/100,estufa:t*m.estufa/100,combo:t*m.combo/100}};
function unitOrcDay(uid,ds){const rec=(S.records[ds]||{})[uid]||{};const o={tot:0,val:0};T.forEach(t=>{const q=Number(rec[t]?.qtd)||0,v=Number(rec[t]?.valor)||0;o[t]={q,v,tk:q>0?v/q:0};o.tot+=q;o.val+=v});return o}
function orcDay(ds){const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});S.config.units.forEach(u=>{const ud=unitOrcDay(u.id,ds);T.forEach(t=>{o[t].q+=ud[t].q;o[t].v+=ud[t].v});o.tot+=ud.tot;o.val+=ud.val});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function orcMonth(ms){const days=wdOf(ms);const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});days.forEach(d=>{const dd=orcDay(d);T.forEach(t=>{o[t].q+=dd[t].q;o[t].v+=dd[t].v});o.tot+=dd.tot;o.val+=dd.val});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function adjMeta(ds){const ms=ds.slice(0,7),W=wdCount(ms),mM=W*dMeta(),pos=dayPos(ds);if(pos<1)return dMeta();let rb=0;wdOf(ms).filter(d=>d<ds).forEach(d=>rb+=orcDay(d).tot);const dl=W-pos+1;return dl>0?Math.max((mM-rb)/dl,0):dMeta()}
function salesByDate(ds){return S.sales.filter(s=>s.saleDate===ds)}
function salesDay(ds){const sl=salesByDate(ds);const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});sl.forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function salesDayUnit(uid,ds){const sl=salesByDate(ds).filter(s=>s.unitId===uid);const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});sl.forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function salesMonth(ms){const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});S.sales.filter(s=>s.saleDate?.slice(0,7)===ms).forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function salesMonthUnit(uid,ms){const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});S.sales.filter(s=>s.saleDate?.slice(0,7)===ms&&s.unitId===uid).forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function pipelineMonth(ms){const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});S.sales.filter(s=>s.orcDate?.slice(0,7)===ms).forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
function pipelineMonthUnit(uid,ms){const o={tot:0,val:0};T.forEach(t=>o[t]={q:0,v:0,tk:0});S.sales.filter(s=>s.orcDate?.slice(0,7)===ms&&s.unitId===uid).forEach(s=>{T.forEach(t=>{const q=Number(s[t]?.qtd)||0,v=Number(s[t]?.valor)||0;o[t].q+=q;o[t].v+=v;o.tot+=q;o.val+=v})});T.forEach(t=>o[t].tk=o[t].q>0?o[t].v/o[t].q:0);return o}
const stR=r=>r>=1?{c:'pill-ok',l:'No ritmo'}:r>=.85?{c:'pill-warn',l:'Em alerta'}:{c:'pill-bad',l:'Abaixo'};
function showTab(n){document.querySelectorAll('.tab-btn').forEach(b=>{b.dataset.tab===n?(b.classList.add('tab-active'),b.classList.remove('tab-inactive')):(b.classList.remove('tab-active'),b.classList.add('tab-inactive'))});['registrar','vendas','diaria','mensal','pipeline','historico','acumulado','config'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==n));({registrar:renderReg,vendas:renderVendas,diaria:renderDiaria,mensal:renderMensal,pipeline:renderPipeline,historico:renderHist,acumulado:renderAcumulado,config:renderCfg})[n]()}
function kpi(l,v,s){return`<div class="bg-slate-50 rounded p-3 border border-slate-200"><p class="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">${l}</p><p class="text-xl font-bold text-slate-900 num">${v}</p>${s?`<p class="text-[10px] text-slate-500 mt-1">${s}</p>`:''}</div>`}
function renderReg(){const di=document.getElementById('reg-date');if(!di.value)di.value=today();updRegInfo();const c=document.getElementById('reg-units');c.innerHTML='';const ds=di.value,rec=S.records[ds]||{};S.config.units.forEach(u=>{const us=rec[u.id]||{},meta=uMeta(u),card=document.createElement('div');card.className='card p-4';card.innerHTML=`<div class="flex items-baseline justify-between mb-3"><div><h3 class="font-semibold text-slate-800">${u.name}</h3><p class="text-xs text-slate-500">${u.members.join(', ')||'—'} — meta: ${meta}/dia</p></div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-3">${T.map(t=>{const r=us[t]||{};return`<div class="bg-slate-50 rounded p-3 border border-slate-200"><p class="text-xs font-semibold text-slate-700 mb-2">${TL[t]}</p><label class="block text-[10px] text-slate-500">Quantidade</label><input type="number" min="0" step="1" data-u="${u.id}" data-t="${t}" data-f="qtd" value="${r.qtd??''}" class="ri w-full border border-slate-300 rounded px-2 py-1 text-sm mb-1"><label class="block text-[10px] text-slate-500">Valor total (R$)</label><input type="number" min="0" step="100" data-u="${u.id}" data-t="${t}" data-f="valor" value="${r.valor??''}" class="ri w-full border border-slate-300 rounded px-2 py-1 text-sm"><p class="text-[10px] text-slate-500 mt-1 rk" data-u="${u.id}" data-t="${t}">TK: <span class="font-semibold">${r.qtd>0&&r.valor>0?f$(r.valor/r.qtd):'—'}</span></p></div>`}).join('')}</div>`;c.appendChild(card)});if(VIEW_MODE)document.getElementById('reg-actions').style.display='none';c.querySelectorAll('.ri').forEach(i=>i.addEventListener('input',()=>{if(VIEW_MODE)return;const u=i.dataset.u,t=i.dataset.t,gv=f=>Number(c.querySelector(`.ri[data-u="${u}"][data-t="${t}"][data-f="${f}"]`)?.value)||0;const q=gv('qtd'),v=gv('valor');c.querySelector(`.rk[data-u="${u}"][data-t="${t}"] span`).textContent=q>0&&v>0?f$(v/q):'—'}));applyViewMode();}
function updRegInfo(){const ds=document.getElementById('reg-date').value,i=document.getElementById('reg-date-info');if(!ds){i.textContent='';return}if(!isWD(ds))i.innerHTML=`<span class="pill pill-warn">Fim de semana</span>`;else i.innerHTML=`Dia útil <span class="num font-semibold">${dayPos(ds)}</span> de <span class="num font-semibold">${wdCount(ds.slice(0,7))}</span>`}
function onSave(){if(VIEW_MODE)return;const ds=document.getElementById('reg-date').value;if(!ds){alert('Selecione data.');return}const rec={};document.querySelectorAll('#reg-units .ri').forEach(i=>{const u=i.dataset.u,t=i.dataset.t,f=i.dataset.f;if(!rec[u])rec[u]={};if(!rec[u][t])rec[u][t]={};rec[u][t][f]=Number(i.value)||0});Object.keys(rec).forEach(u=>{const tot=T.reduce((s,t)=>s+(rec[u][t]?.qtd||0)+(rec[u][t]?.valor||0),0);if(tot===0)delete rec[u]});if(Object.keys(rec).length===0)delete S.records[ds];else S.records[ds]=rec;saveRec();const fb=document.getElementById('save-fb');fb.textContent=`Salvo ${fD(ds)}.`;setTimeout(()=>fb.textContent='',2500)}
function renderVendas(){if(VIEW_MODE)document.getElementById('venda-form-card').style.display='none';const sel=document.getElementById('sale-unit');sel.innerHTML='<option value="">Selecione...</option>';S.config.units.forEach(u=>sel.innerHTML+=`<option value="${u.id}">${u.name} (${u.members.join(', ')||'—'})</option>`);if(!document.getElementById('sale-date').value)document.getElementById('sale-date').value=today();updSalePreview();renderSaleList();applyViewMode();}
function updSalePreview(){const orcDate=document.getElementById('sale-orc-date').value,uid=document.getElementById('sale-unit').value;const prev=document.getElementById('sale-orc-preview'),inp=document.getElementById('sale-inputs');if(!orcDate||!uid){prev.innerHTML='<p class="text-xs text-slate-400">Selecione data do orçamento e time.</p>';inp.innerHTML='';return}const ud=unitOrcDay(uid,orcDate);if(ud.tot===0){prev.innerHTML=`<p class="text-xs text-amber-600">Nenhum orçamento em ${fD(orcDate)}.</p>`;inp.innerHTML='';return}const uName=S.config.units.find(u=>u.id===uid)?.name||uid;prev.innerHTML=`<div class="bg-slate-50 rounded p-3 border border-slate-200"><p class="text-xs font-semibold text-slate-600 mb-2">Orçamentos de ${uName} em ${fD(orcDate)}</p><div class="grid grid-cols-3 gap-3 text-xs">${T.map(t=>`<div><span class="font-semibold">${TL[t]}</span><br>${ud[t].q} orç. · ${f$(ud[t].v)}<br>TK: ${ud[t].q>0?f$(ud[t].tk):'—'}</div>`).join('')}</div><p class="text-xs text-slate-500 mt-2">Total: ${ud.tot} · ${f$(ud.val)}</p></div>`;inp.innerHTML=`<p class="text-xs font-semibold text-slate-600 mb-2 mt-3">Dados da venda</p><div class="grid grid-cols-1 md:grid-cols-3 gap-3">${T.map(t=>`<div class="bg-emerald-50 rounded p-3 border border-emerald-200"><p class="text-xs font-semibold text-emerald-800 mb-2">${TL[t]} <span class="font-normal text-slate-500">(orç: ${ud[t].q})</span></p><label class="block text-[10px] text-slate-500">Qtd vendida</label><input type="number" min="0" step="1" id="sv-${t}-q" class="w-full border border-emerald-300 rounded px-2 py-1 text-sm mb-1 bg-white"><label class="block text-[10px] text-slate-500">Valor (R$)</label><input type="number" min="0" step="100" id="sv-${t}-v" class="w-full border border-emerald-300 rounded px-2 py-1 text-sm bg-white"></div>`).join('')}</div>`}
function onSaveSale(){if(VIEW_MODE)return;const orcDate=document.getElementById('sale-orc-date').value,uid=document.getElementById('sale-unit').value,saleDate=document.getElementById('sale-date').value;if(!orcDate||!uid||!saleDate){alert('Preencha todos os campos.');return}const sale={id:'s'+Date.now(),orcDate,saleDate,unitId:uid};let anyQty=false;T.forEach(t=>{const q=Number(document.getElementById(`sv-${t}-q`)?.value)||0,v=Number(document.getElementById(`sv-${t}-v`)?.value)||0;if(q>0){sale[t]={qtd:q,valor:v};anyQty=true}});if(!anyQty){alert('Insira ao menos uma venda.');return}S.sales.push(sale);saveSales();document.getElementById('sale-fb').textContent='Venda salva.';setTimeout(()=>document.getElementById('sale-fb').textContent='',3000);T.forEach(t=>{['q','v'].forEach(f=>{const el=document.getElementById(`sv-${t}-${f}`);if(el)el.value=''})});renderSaleList()}
function renderSaleList(){const mi=document.getElementById('sale-list-month');if(!mi.value)mi.value=thisMo();const ms=mi.value,sl=S.sales.filter(s=>s.saleDate?.slice(0,7)===ms).sort((a,b)=>b.saleDate.localeCompare(a.saleDate));const cont=document.getElementById('sale-list');if(sl.length===0){cont.innerHTML='<p class="text-xs text-slate-400 py-4">Sem vendas neste mês.</p>';return}let h=`<table><thead><tr><th>Dt venda</th><th>Dt orç.</th><th>Time</th><th class="text-right">Hidro</th><th class="text-right">Estufa</th><th class="text-right">Combo</th><th class="text-right">Total</th>${VIEW_MODE?'':'<th></th>'}</tr></thead><tbody>`;sl.forEach(s=>{const uName=S.config.units.find(u=>u.id===s.unitId)?.name||s.unitId;const tot=T.reduce((a,t)=>a+(Number(s[t]?.qtd)||0),0),totV=T.reduce((a,t)=>a+(Number(s[t]?.valor)||0),0);h+=`<tr><td class="num">${fD(s.saleDate)}</td><td class="num text-slate-500">${fD(s.orcDate)}</td><td>${uName}</td>`;T.forEach(t=>{const q=s[t]?.qtd||0,v=s[t]?.valor||0;h+=`<td class="text-right num">${q>0?`${q}·${f$(v)}`:'—'}</td>`});h+=`<td class="text-right num font-semibold">${tot}·${f$(totV)}</td>`;if(!VIEW_MODE)h+=`<td><button onclick="delSale('${s.id}')" class="text-rose-500 text-xs">✕</button></td>`;h+=`</tr>`});cont.innerHTML=h+`</tbody></table>`}
function delSale(id){if(VIEW_MODE||!confirm('Excluir?'))return;S.sales=S.sales.filter(s=>s.id!==id);saveSales();renderSaleList()}
function renderDiaria(){const di=document.getElementById('view-date');if(!di.value)di.value=VIEW_MODE?yesterday():today();const ds=di.value,ms=ds.slice(0,7),pos=dayPos(ds),W=wdCount(ms);document.getElementById('view-date-info').innerHTML=pos>0?`Dia útil <span class="num font-semibold">${pos}</span>/<span class="num font-semibold">${W}</span>`:`<span class="pill pill-warn">Fora dos dias úteis</span>`;const od=orcDay(ds),dm=dMeta(),am=adjMeta(ds),tk=S.config.tickets;const ratio=am>0?od.tot/am:0,st=stR(ratio);const mRev=am*((S.config.mix.hidro/100)*tk.hidro+(S.config.mix.estufa/100)*tk.estufa+(S.config.mix.combo/100)*tk.combo);const sd=salesDay(ds),conv=od.tot>0?sd.tot/od.tot:0;let h=`<p class="sl">Orçamentos</p><div class="card p-4"><div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${kpi('Orçamentos',fN(od.tot),'Meta: '+dm)}${kpi('Meta ajustada',fN(am,1),'Gap acum.')}${kpi('Status',`<span class="pill ${st.c}">${st.l}</span>`,fP(ratio))}${kpi('Pipeline orç.',f$(od.val),'Meta: '+f$(mRev))}</div></div><p class="sl sl-green">Vendas fechadas neste dia</p><div class="card p-4 border-emerald-200"><div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${kpi('Vendas',fN(sd.tot),'de '+fN(od.tot)+' orç.')}${kpi('Pipeline vendas',f$(sd.val),'')}${kpi('Conversão',fP(conv),'')}${kpi('TK vendas',sd.tot>0?f$(sd.val/sd.tot):'—','')}</div></div>`;h+=`<p class="sl">Por tipo</p><div class="card overflow-x-auto"><table><thead><tr><th>Tipo</th><th class="text-right">Orç.</th><th class="text-right">TK orç.</th><th class="text-right">TK meta</th><th class="text-right">Δ TK</th><th class="text-right text-emerald-700">Vendas</th><th class="text-right text-emerald-700">TK venda</th></tr></thead><tbody>`;T.forEach(t=>{const o=od[t],s=sd[t],dl=o.tk-tk[t];h+=`<tr><td class="font-medium">${TL[t]}</td><td class="text-right num">${fN(o.q)}</td><td class="text-right num">${o.q>0?f$(o.tk):'—'}</td><td class="text-right num text-slate-500">${f$(tk[t])}</td><td class="text-right num ${dl>=0?'text-emerald-70 ntById('acum-content').innerHTML=h;applyViewMode();}
function renderCfg(){document.getElementById('cfg-meta').value=S.config.metaPerPerson;document.getElementById('cfg-tkh').value=S.config.tickets.hidro;document.getElementById('cfg-tke').value=S.config.tickets.estufa;document.getElementById('cfg-tkc').value=S.config.tickets.combo;document.getElementById('cfg-mh').value=S.config.mix.hidro;document.getElementById('cfg-me').value=S.config.mix.estufa;document.getElementById('cfg-mc').value=S.config.mix.combo;document.getElementById('cfg-wd').value=S.config.workDaysOverride??'';document.getElementById('cfg-sd').value=S.config.monthStartDate??'';const l=document.getElementById('cfg-units');l.innerHTML='';S.config.units.forEach((u,i)=>{const d=document.createElement('div');d.className='border border-slate-200 rounded p-3 bg-slate-50';d.innerHTML=`<div class="grid grid-cols-1 sm:grid-cols-12 gap-3 items-end"><div class="sm:col-span-3"><label class="block text-[11px] font-semibold text-slate-600 mb-1">Nome</label><input type="text" data-ci="${i}" data-cf="name" value="${u.name}" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full"></div><div class="sm:col-span-7"><label class="block text-[11px] font-semibold text-slate-600 mb-1">Vendedores</label><input type="text" data-ci="${i}" data-cf="members" value="${u.members.join(', ')}" class="border border-slate-300 rounded px-2 py-1.5 text-sm w-full"></div><div class="sm:col-span-2 flex justify-end"><button data-cr="${i}" class="px-3 py-1.5 text-xs border border-rose-300 text-rose-700 rounded hover:bg-rose-50">×</button></div></div>`;l.appendChild(d)});l.querySelectorAll('[data-cr]').forEach(b=>b.addEventListener('click',()=>{if(VIEW_MODE)return;const i=Number(b.dataset.cr);if(confirm(`Remover ${S.config.units[i].name}?`)){S.config.units.splice(i,1);renderCfg()}}))}
function onSaveCfg(){if(VIEW_MODE)return;S.config.metaPerPerson=Number(document.getElementById('cfg-meta').value)||0;S.config.tickets={hidro:Number(document.getElementById('cfg-tkh').value)||0,estufa:Number(document.getElementById('cfg-tke').value)||0,combo:Number(document.getElementById('cfg-tkc').value)||0};S.config.mix={hidro:Number(document.getElementById('cfg-mh').value)||0,estufa:Number(document.getElementById('cfg-me').value)||0,combo:Number(document.getElementById('cfg-mc').value)||0};const wd=document.getElementById('cfg-wd').value;S.config.workDaysOverride=wd?Number(wd):null;const sd=document.getElementById('cfg-sd').value;S.config.monthStartDate=sd||null;document.querySelectorAll('[data-ci]').forEach(i=>{const idx=Number(i.dataset.ci),f=i.dataset.cf;if(!S.config.units[idx])return;if(f==='name')S.config.units[idx].name=i.value.trim()||`Unidade ${idx+1}`;if(f==='members')S.config.units[idx].members=i.value.split(',').map(s=>s.trim()).filter(Boolean)});saveCfg();document.getElementById('cfg-fb').textContent='Salvo.';setTimeout(()=>document.getElementById('cfg-fb').textContent='',2500);renderCfg()}
function onExp(){const d=JSON.stringify({config:S.config,records:S.records,sales:S.sales},null,2),b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`hidrogood-backup-${today()}.json`;a.click();URL.revokeObjectURL(u)}
function onImpFile(e){const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{try{const o=JSON.parse(ev.target.result);if(!confirm('Substituir dados?'))return;if(o.config)S.config=o.config;if(o.records)S.records=o.records;if(o.sales)S.sales=o.sales;saveCfg();saveRec();saveSales();alert('Importado.');showTab('config')}catch(err){alert('Inválido.')}};reader.readAsText(f)}
function init(){document.getElementById('hoje-label').textContent=`Hoje · ${fD(today())}`;const fromHash=checkViewMode();if(!fromHash)load();if(VIEW_MODE){document.getElementById('view-banner').style.display='flex';document.getElementById('tab-btn-config').style.display='none';}document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));document.getElementById('reg-date').addEventListener('change',()=>{updRegInfo();renderReg()});document.getElementById('btn-save').addEventListener('click',onSave);document.getElementById('btn-clear').addEventListener('click',()=>{if(VIEW_MODE||!confirm('Limpar?'))return;document.querySelectorAll('#reg-units .ri').forEach(i=>i.value='');document.querySelectorAll('#reg-units .rk span').forEach(s=>s.textContent='—')});document.getElementById('sale-orc-date').addEventListener('change',updSalePreview);document.getElementById('sale-unit').addEventListener('change',updSalePreview);document.getElementById('btn-save-sale').addEventListener('click',onSaveSale);document.getElementById('sale-list-month').addEventListener('change',renderSaleList);document.getElementById('view-date').addEventListener('change',renderDiaria);document.getElementById('mensal-month').addEventListener('change',renderMensal);document.getElementById('pipeline-month').addEventListener('change',renderPipeline);document.getElementById('hist-month').addEventListener('change',renderHist);document.getElementById('btn-save-cfg').addEventListener('click',onSaveCfg);document.getElementById('btn-add-u').addEventListener('click',()=>{if(VIEW_MODE)return;S.config.units.push({id:'u'+Date.now(),name:'Nova '+(S.config.units.length+1),members:[]});renderCfg()});document.getElementById('btn-reset-cfg').addEventListener('click',()=>{if(VIEW_MODE||!confirm('Restaurar?'))return;S.config=structuredClone(DCFG);saveCfg();renderCfg()});document.getElementById('btn-wipe').addEventListener('click',()=>{if(VIEW_MODE||!confirm('Apagar TUDO?'))return;S.records={};S.sales=[];saveRec();saveSales();alert('Apagado.')});document.getElementById('btn-exp').addEventListener('click',onExp);document.getElementById('btn-imp').addEventListener('click',()=>{if(VIEW_MODE)return;document.getElementById('btn-imp-f').click()});document.getElementById('btn-imp-f').addEventListener('change',onImpFile);document.getElementById('btn-share').addEventListener('click',genShareLink);document.getElementById('btn-copy-url').addEventListener('click',()=>copyToClipboard(document.getElementById('share-url-input').value,'share-fb','Copiado!'));showTab(VIEW_MODE?'diaria':'registrar')}
init();
</script>
